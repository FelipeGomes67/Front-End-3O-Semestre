<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


</head>
<body>
    <h1 id="titulo">Bem Vindo</h1>
    <p>Hello DOM JS</p>
    <button onclick="saudacao();">Click em Mim</button>
    <button ondblclick="mouseClicadoDuasVezes();">Click 2 vezes</button>
    <button onmousedown="saudacao();">Click em Mim</button>
    <button onmouseup="saudacao();">Click em Mim</button>
    <button onmouseover="saudacaoLegal();">Click em Mim</button>


    <script>
        // JavaScript é uma linguagem Case Sensitive
        // por convenção, utilizamos o padrão camelCase

        alert(`Titulo: ${document.getElementById("titulo").textContent}`);

        function saudacao() {
            alert("Hello World!");
        }
        function saudacaoLegal() {
            alert("Olá amigo!");
        }
        function mouseClicadoDuasVezes(){
            alert("Mouse clicado duas vezes!");
        }
        </script>        
</body>
</html>
